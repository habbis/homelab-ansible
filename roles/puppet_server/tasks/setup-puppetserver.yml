- name: create r10k dir
  ansible.builtin.file:
    path: /etc/puppet/r10k
    state: directory

- name: set hiera files
  ansible.builtin.template:
    src: templates/hiera.yaml.j2
    dest: /etc/puppet/hiera.yaml
    owner: root
    group: root
    mode: '0644'

- name: Generate an OpenSSH keypair for puppet
  community.crypto.openssh_keypair:
    path: /root/.ssh/id_ed25519
    comment: root@puppet
    type: ed25519

- name: install r10k
  command: /usr/bin/gem install r10k

- name: install hiera-eyaml
  command: /usr/bin/gem install hiera-eyaml

- name: set r10k config
  ansible.builtin.template:
    src: templates/r10k.yaml.j2
    dest: /etc/puppet/r10k/r10k.yaml
    owner: root
    group: root
    mode: '0644'
